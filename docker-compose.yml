# Quickstart self-host. For production behind Traefik/Dokploy, drop `ports`
# and route a domain to port 8088 instead. See README.
services:
  climax:
    build: .
    image: climax:latest
    restart: unless-stopped
    environment:
      PORT: "8088"
      # API key the CRM will send (Authorization: Bearer ...). Required.
      CLIMAX_API_KEY: ${CLIMAX_API_KEY:?set CLIMAX_API_KEY}
      # Claude auth (Max OAuth token) — or an API key the claude CLI trusts.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:?set CLAUDE_CODE_OAUTH_TOKEN}
      CLIMAX_MODEL_ID: climax
      # Pool size. Excess requests wait in an unbounded FIFO queue (never dropped).
      CLIMAX_MAX_CONCURRENCY: "${CLIMAX_MAX_CONCURRENCY:-12}"
      # Per-run anti-freeze only (not a queue limit).
      CLIMAX_TIMEOUT_MS: "${CLIMAX_TIMEOUT_MS:-180000}"
    ports:
      - "8088:8088"
